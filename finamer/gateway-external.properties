#gateway.properties
# Server Configuration
server.port=${GATEWAY_SERVER_PORT}
server.servlet.context-path=/

# Spring Application
spring.application.name=gateway
spring.main.allow-bean-definition-overriding=true
spring.main.web-application-type=REACTIVE

#Keycloak Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_JWT_ISSUER_URI}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWT_JWK_SET_URI}
spring.security.oauth2.client.provider.keycloak.token-uri=${KEYCLOAK_TOKEN_URI}

# JWT Configuration
jwt.auth.converter.resource-id=${JWT_AUTH_RESOURCE_ID}
jwt.auth.converter.principle-attribute=preferred_username

#Spring Cloud Gateway Configuration
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Request-Method Access-Control-Allow-Origin Access-Control-Request-Headers, RETAIN_UNIQUE
spring.cloud.gateway.httpclient.disable-content-security=true

# Scheduler Configuration
scheduler.config.enabled=false
scheduler.config.initialDelay=10
scheduler.config.refreshRate=8

#Kafka Configuration
KAFKA_BOOTSTRAP_ADDRESS=${KAFKA_BOOTSTRAP_ADDRESS}
KAFKA_GROUP_ID=${GATEWAY_KAFKA_GROUP_ID}
KAFKA_SASL_USERNAME=${KAFKA_USERNAME}
KAFKA_SASL_PASSWORD=${KAFKA_PASSWORD}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.group-id=${GATEWAY_KAFKA_GROUP_ID}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# application.properties
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

#Static service routes Configuration
#Security:
spring.cloud.gateway.routes[0].id=security
spring.cloud.gateway.routes[0].uri=${SECURITY_SERVICE}
spring.cloud.gateway.routes[0].predicates[0]=Path=/security/api/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

#Innsist:
spring.cloud.gateway.routes[1].id=innsist
spring.cloud.gateway.routes[1].uri=${INNSIST_SERVICE}
spring.cloud.gateway.routes[1].predicates[0]=Path=/innsist/api/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

#Invoicing:
spring.cloud.gateway.routes[2].id=invoicing
spring.cloud.gateway.routes[2].uri=${INVOICING_SERVICE}
spring.cloud.gateway.routes[2].predicates[0]=Path=/invoicing/api/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1

# ✨ NUEVA RUTA: Para comunicación inter-microservicios
spring.cloud.gateway.routes[3].id=internal-communication
spring.cloud.gateway.routes[3].uri=lb://internal-services
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/internal/**
spring.cloud.gateway.routes[3].predicates[1]=Header=X-Service-Token
spring.cloud.gateway.routes[3].filters[0]=AddRequestHeader=X-Internal-Route,true

#JMX Exporter - Monitoring Configuration
management.security.enable=false
management.endpoint.metrics.enabled=true
management.endpoints.jmx.exposure.include=*
management.endpoints.web.exposure.include=health,info,metrics,prometheus,openapi,swagger-ui,gateway,refresh
management.endpoints.enabled-by-default=true
management.metrics.enable.http=true
management.metrics.export.prometheus.enabled=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.web.server.auto-time-requests=true

#MinIO
minio.endpoint.url=${MINIO_URL}
minio.accessKey=${MINIO_ACCESS_KEY}
minio.secretKey=${MINIO_ACCESS_SECRET}
minio.bucketName=${MINIO_BUCKET_NAME}
minio.bucket.private=false

# Logging Level
logging.level.org.springframework.cloud=DEBUG
logging.level.keycloak=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty.http.client=DEBUG
logging.level.org.springframework.web.reactive.function.client.ExchangeFunctions=TRACE

# CORS configuration (más permisivo para gateway)
cors.cors-enabled=true
cors.allowed-origins=${ALLOWED_ORIGINS:*}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,HEAD,PATCH
cors.allowed-headers=*
cors.allow-credentials=true
cors.max-age=3600

# Rutas públicas para el Gateway (AGREGAR)

# Springdoc Swagger UI Configuration
springdoc.swagger-ui.path=/swagger-ui.html

# Management Endpoints Configuration
management.endpoints.web.exposure.include=openapi,swagger-ui

# Enable Swagger UI
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# Configuración de seguridad para Swagger
springdoc.swagger-ui.oauth2-redirect-url=/swagger-ui/oauth2-redirect.html
springdoc.swagger-ui.supported-submit-methods=get,post,put,delete,patch

# API Docs Configuration
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs

# Configuración del Gateway para Swagger (ACTUALIZADA)
springdoc.swagger-ui.urls[0].name=🏢 Gateway API
springdoc.swagger-ui.urls[0].url=/v3/api-docs

springdoc.swagger-ui.urls[1].name=🔐 Security Service
springdoc.swagger-ui.urls[1].url=${SECURITY_SERVICE}/v3/api-docs

springdoc.swagger-ui.urls[2].name=📈 Innsist Service
springdoc.swagger-ui.urls[2].url=${INNSIST_SERVICE}/v3/api-docs

springdoc.swagger-ui.urls[3].name=🧾 Invoice Service
springdoc.swagger-ui.urls[3].url=${INVOICING_SERVICE}/v3/api-docs

# Security Configuration 2025-10-03
kynsoft.security.enabled=true
kynsoft.security.microservice.enabled=true
kynsoft.security.webclient.enabled=true
kynsoft.security.debug-enabled=true
kynsoft.security.internal-service-token=${INTERNAL_SERVICE_TOKEN}
kynsoft.security.jwt.secret=${JWT_SECRET}
kynsoft.security.jwt.internal.enabled=true
kynsoft.security.jwt.internal.expiration=86400000
kynsoft.security.jwt.internal.algorithm=HS256
kynsoft.security.jwt.internal.issuer=kynsoft-internal
kynsoft.security.jwt.internal.audience=internal-microservices
kynsoft.security.jwt.internal.cache-enabled=true
kynsoft.security.jwt.internal.cache-cleanup-interval=3600000
kynsoft.security.jwt.internal.rotation-enabled=false
kynsoft.security.microservice.security.protected-paths=/api/internal/**,\
  /actuator/gateway/**,\
  /creditcard/api/**,\
  /settings/api/**,\
  /payment/api/**,\
  /invoicing/api/**,\
  /report/api/**,\
  /tcaInnsist/api/**,\
  /innsist/api/**,\
  /audit/api/**,\
  /cloudBridges/api/**,\
  /scheduler/api/**,\
  /security/api/permission/**,/api/user-permission-business/**,/api/locations/**,/api/business-module/**,/api/business/**
kynsoft.security.microservice.security.public-paths=/actuator/health,/actuator/info,/swagger-ui/**,/swagger-ui.html,/v3/api-docs/**,/webjars/**,/security/api/auth/**
kynsoft.security.microservice.security.strict-validation=false
kynsoft.security.microservice.security.audit-enabled=true
kynsoft.security.webclient.retry.max-attempts=3
kynsoft.security.webclient.retry.backoff-delay-ms=1000
kynsoft.security.webclient.retry.enabled=true
kynsoft.security.webclient.timeout.connection-timeout-ms=5000
kynsoft.security.webclient.timeout.response-timeout-ms=30000
kynsoft.security.webclient.timeout.read-timeout-ms=30000
kynsoft.environment=${KYNSOFT_ENVIRONMENT}
