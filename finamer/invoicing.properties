# Server Configuration
server.port=${INVOICING_SERVER_PORT}
server.servlet.context-path=/
spring.codec.max-in-memory-size=2MB

# Spring Application
spring.main.allow-bean-definition-overriding=true
spring.main.web-application-type=REACTIVE

#Keycloak Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_JWT_ISSUER_URI}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWT_JWK_SET_URI}
spring.security.oauth2.client.provider.keycloak.token-uri=${KEYCLOAK_TOKEN_URI}

#Datasource Configurations
spring.jpa.database=default
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.generate-ddl=true
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none

spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.url=${INVOICING_DB_HOST_RW}
spring.datasource.username=${INVOICING_DB_USER_RW}
spring.datasource.password=${INVOICING_DB_PASSWORD_RW}
spring.datasource.hikari.pool-name=invoice-rw-pool

spring.read-datasource.driverClassName=org.postgresql.Driver
spring.read-datasource.url=${INVOICING_DB_HOST_R}
spring.read-datasource.username=${INVOICING_DB_USER_R}
spring.read-datasource.password=${INVOICING_DB_PASSWORD_R}
spring.read-datasource.hikari.pool-name=invoice-r-pool

# JWT Configuration
jwt.auth.converter.resource-id=${JWT_AUTH_RESOURCE_ID}
jwt.auth.converter.principle-attribute=preferred_username

#Kafka Configuration
KAFKA_BOOTSTRAP_ADDRESS=${KAFKA_BOOTSTRAP_ADDRESS}
KAFKA_GROUP_ID=${INVOICING_KAFKA_GROUP_ID}
KAFKA_SASL_USERNAME=${KAFKA_USERNAME}
KAFKA_SASL_PASSWORD=${KAFKA_PASSWORD}

#Redis Configuration
spring.redis.host=${REDIS_ADDRESS}
spring.redis.port=${REDIS_PORT}

#Internal Endpoints
cloudbridges.service.url=${CLOUD_BRIDGES_SERVICE}

report.service.url=${REPORT_SERVICE}/api/reports/generate-template
upload.location=/tmp/upload

file.service.url=${FILE_SERVICE_URL}
mail.api.url=${MAIL_API_URL}
ftp.api.url=${FTP_API_URL}
account.statement.service.url=${PAYMENT_SERVICE}
resource.type.code=INV
attachment.type.code=INV

#reportes code
report.code.invoice.booking=inv
report.code.invoice.reconcile=rec

#JMX Exporter - Monitoring Configuration
management.security.enable=false
management.endpoint.metrics.enabled=true
management.endpoints.jmx.exposure.include=*
management.endpoints.web.exposure.include=health,info,metrics,prometheus,security
management.endpoints.enabled-by-default=true

management.metrics.enable.http=true
management.metrics.export.prometheus.enabled=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.web.server.auto-time-requests=true

#MinIO
minio.endpoint.url=${MINIO_URL}
minio.accessKey=${MINIO_ACCESS_KEY}
minio.secretKey=${MINIO_ACCESS_SECRET}
minio.bucketName=${INVOICING_MINIO_BUCKET_NAME}
minio.bucket.private=false

# Logging Level
logging.level.org.springframework.cloud=DEBUG
logging.level.keycloak=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty.http.client=DEBUG
logging.level.org.springframework.web.reactive.function.client.ExchangeFunctions=TRACE

#CORS Configuration
cors.cors-enabled=true
cors.allowed-origins=${GATEWAY_SERVICE}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,HEAD,PATCH
cors.allowed-headers=Authorization,Content-Type,X-Requested-With,Accept,Origin,X-Service-Token,X-User-Context,X-Internal-JWT
cors.allow-credentials=true
cors.max-age=3600

# Rutas públicas para el Gateway (AGREGAR)


# Springdoc Swagger UI Configuration
springdoc.swagger-ui.path=/swagger-ui.html

# Management Endpoints Configuration
management.endpoints.web.exposure.include=openapi,swagger-ui

# Security Configuration 2025-10-03
kynsoft.security.enabled=true
kynsoft.security.microservice.enabled=true
kynsoft.security.webclient.enabled=true
kynsoft.security.debug-enabled=true
kynsoft.security.internal-service-token=${INTERNAL_SERVICE_TOKEN}
kynsoft.security.jwt.secret=${JWT_SECRET}
kynsoft.security.jwt.internal.enabled=true
kynsoft.security.jwt.internal.expiration=86400000
kynsoft.security.jwt.internal.algorithm=HS256
kynsoft.security.jwt.internal.issuer=kynsoft-internal
kynsoft.security.jwt.internal.audience=internal-microservices
kynsoft.environment=${KYNSOFT_ENVIRONMENT}

kynsoft.security.microservice.security.protected-paths=/api/**
kynsoft.security.microservice.security.public-paths=/actuator/**,/v3/api-docs/**,/swagger-ui/**,/webjars/**
kynsoft.security.microservice.security.strict-validation=true
kynsoft.security.microservice.security.audit-enabled=true

kynsoft.security.webclient.retry.max-attempts=3
kynsoft.security.webclient.retry.backoff-delay-ms=1000
kynsoft.security.webclient.retry.enabled=true
kynsoft.security.webclient.timeout.connection-timeout-ms=5000
kynsoft.security.webclient.timeout.response-timeout-ms=30000
kynsoft.security.webclient.timeout.read-timeout-ms=30000

import.progress.redis.prefix=import:progress:
import.progress.redis.history.prefix=import:history:
import.progress.redis.user.history.prefix=import:user:
import.progress.redis.ttl=1800
import.progress.redis.history.ttl=86400
import.progress.redis.user.history.ttl=604800
import.progress.redis.grace.period=300

# ===============================================
# EXISTING KAFKA CONFIGURATION
# ===============================================
finamer.kafka.enabled=true
finamer.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_ADDRESS}
finamer.kafka.default-topic=invoicing-default

# Security
finamer.kafka.security.enabled=true
finamer.kafka.security.protocol=SASL_PLAINTEXT
finamer.kafka.security.mechanism=PLAIN
finamer.kafka.security.username=${KAFKA_USERNAME}
finamer.kafka.security.password=${KAFKA_PASSWORD}

# Consumer Configuration
finamer.kafka.consumer.group-id=${INVOICING_KAFKA_GROUP_ID}
finamer.kafka.consumer.auto-offset-reset=earliest
finamer.kafka.consumer.enable-auto-commit=false
finamer.kafka.consumer.max-poll-records=100
finamer.kafka.consumer.concurrency=3
finamer.kafka.consumer.poll-timeout=3s

# Producer Configuration
finamer.kafka.producer.enable-idempotency=true
finamer.kafka.producer.max-request-size=104857600
finamer.kafka.producer.acks=all
finamer.kafka.producer.retries=3
finamer.kafka.producer.batch-size=16384
finamer.kafka.producer.linger-ms=5
finamer.kafka.producer.buffer-memory=33554432

# Idempotency Configuration
finamer.kafka.idempotency.key-prefix=finamer:invoicing:processed:

# Metrics Configuration
finamer.kafka.metrics.enabled=true
finamer.kafka.metrics.prefix=finamer.kafka.invoicing
finamer.kafka.metrics.default-tags.service=finamer-invoicing
finamer.kafka.metrics.default-tags.environment=${KYNSOFT_ENVIRONMENT}

# ===============================================
# ACTUATOR
# ===============================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# ===============================================
# MESSAGE TYPE REGISTRY
# ===============================================
# Validación estricta de tipos (desarrollo: true, producción: false)
finamer.kafka.message-types.strict-validation=${KAFKA_STRICT_VALIDATION:false}

# Auto-registrar tipos por defecto
finamer.kafka.message-types.auto-register-defaults=true

# ===============================================
# LOGGING
# ===============================================
logging.level.com.kynsoft.finamer.kafka=DEBUG
logging.level.org.flywaydb=INFO
logging.level.org.springframework.kafka=INFO

# Rondanet WS Circuit Breaker
resilience4j.circuitbreaker.instances.rondanet.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.rondanet.sliding-window-size=10
resilience4j.circuitbreaker.instances.rondanet.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.rondanet.slow-call-rate-threshold=80
resilience4j.circuitbreaker.instances.rondanet.slow-call-duration-threshold=25s
resilience4j.circuitbreaker.instances.rondanet.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.rondanet.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.rondanet.automatic-transition-from-open-to-half-open-enabled=true

# MinIO configuration for B2B payloads > 64KB
minio.base-url=${MINIO_BASE_URL:}
minio.b2b-bucket=${INVOICING_MINION_B2B_BUCKET_NAME:b2b-payloads}
minio.invoices-bucket=${INVOICING_MINIO_BUCKET_NAME:invoices}
minio.access-key=${MINIO_ACCESS_KEY:}
minio.secret-key=${MINIO_SECRET_KEY:}

# B2B Engine â tunable defaults (override via ServiceParameter in DB)
b2b.engine.enabled=${B2B_ENGINE_ENABLED:false}
b2b.engine.max-retries=${B2B_MAX_RETRIES:5}
b2b.rondanet.timeout-seconds=${RONDANET_TIMEOUT_SECONDS:30}

# CloudBridges stub consumers (Email/FTP/Bavel)
# Set to false when the real CloudBridges microservice is deployed and consuming those topics
b2b.cloudbridges.stubs.enabled=${B2B_CLOUDBRIDGES_STUBS_ENABLED:false}

# ============================================================
# B2B Batch Emit â Thread Pool (B2BBatchProperties)
# 0 = auto-detect: core=availableProcessors, max=2x
# ============================================================
b2b.batch.core-pool-size=0
b2b.batch.max-pool-size=0
b2b.batch.queue-capacity=500
b2b.batch.keep-alive-seconds=60
b2b.batch.max-batch-size=500
b2b.batch.chunk-size=25
b2b.batch.max-heap-usage-pct=80

# ============================================================
# B2B Send Process Progress Tracking â Redis TTLs
# ============================================================
b2b.send.progress.redis.prefix=b2b:send:progress:
b2b.send.progress.redis.history-prefix=b2b:send:history:
b2b.send.progress.redis.user-prefix=b2b:send:user:
b2b.send.progress.redis.ttl=1800
b2b.send.progress.redis.history-ttl=86400
b2b.send.progress.redis.user-ttl=259200
b2b.send.progress.redis.grace-period=300

# ============================================================
# Import Processing (Thread Pools (ImportProcessingProperties)
# 0 = auto-detect: core=availableProcessors, max=2x
# ============================================================
# Main import executor (small â each import is resource-heavy)
invoicing.import.main.core-pool-size=2
invoicing.import.main.max-pool-size=4
invoicing.import.main.queue-capacity=10
invoicing.import.main.keep-alive-seconds=60
invoicing.import.main.await-termination-seconds=120

# Batch room rate processor (medium â parallel data processing)
invoicing.import.batch.core-pool-size=4
invoicing.import.batch.max-pool-size=8
invoicing.import.batch.queue-capacity=100
invoicing.import.batch.keep-alive-seconds=60
invoicing.import.batch.await-termination-seconds=60

# I/O executor (larger â tasks can block on DB/disk)
invoicing.import.io.core-pool-size=6
invoicing.import.io.max-pool-size=12
invoicing.import.io.queue-capacity=200
invoicing.import.io.keep-alive-seconds=120
invoicing.import.io.await-termination-seconds=30

# Validation executor (CPU-bound â 0 = auto availableProcessors)
invoicing.import.validation.core-pool-size=0
invoicing.import.validation.max-pool-size=0
invoicing.import.validation.queue-capacity=500
invoicing.import.validation.keep-alive-seconds=30
invoicing.import.validation.await-termination-seconds=15
